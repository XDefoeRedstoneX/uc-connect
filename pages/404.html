<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | UC-Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl text-center">
        <div class="mb-8">
            <span class="text-9xl font-black text-blue-600/20">404</span>
        </div>
        <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-4">Halaman Tidak Ditemukan</h1>
        <p class="text-lg text-gray-600 mb-8">Maaf, halaman yang Anda cari tidak ada atau telah dipindahkan.</p>
        
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors">
                <span class="material-symbols-outlined">home</span>
                Kembali ke Beranda
            </a>
            <a href="/directory/explore" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-gray-200 text-gray-800 font-bold rounded-lg hover:bg-gray-300 transition-colors">
                <span class="material-symbols-outlined">explore</span>
                Jelajahi Katalog
            </a>
        </div>

        <div class="mt-12 pt-8 border-t border-gray-300">
            <p class="text-sm text-gray-600 mb-4">Bantuan Cepat:</p>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                <a href="/directory/home" class="text-sm text-blue-600 hover:text-blue-800 transition-colors">Beranda</a>
                <a href="/directory/explore" class="text-sm text-blue-600 hover:text-blue-800 transition-colors">Jelajahi</a>
                <a href="/auth/login" class="text-sm text-blue-600 hover:text-blue-800 transition-colors">Masuk</a>
                <a href="/community/forum" class="text-sm text-blue-600 hover:text-blue-800 transition-colors">Forum</a>
            </div>
        </div>
    </div>
</body>
</html>
