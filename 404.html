<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 | UC-Connect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: Inter, sans-serif; }
    .font-headline { font-family: Manrope, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-[#f8f9ff] text-[#121c2a] antialiased">
  <main class="mx-auto flex min-h-screen max-w-4xl flex-col items-center justify-center px-6 text-center">
    <p class="mb-3 rounded-full bg-[#adedd3] px-4 py-1 text-xs font-bold uppercase tracking-[0.2em] text-[#306d58]">Page Not Found</p>
    <h1 class="font-headline text-5xl font-extrabold tracking-tight text-[#00236f] sm:text-6xl">404</h1>
    <p class="mt-4 max-w-xl text-base text-[#444651] sm:text-lg">Halaman yang kamu cari tidak tersedia atau sudah dipindahkan ke URL baru.</p>
    <div class="mt-8 flex flex-col gap-3 sm:flex-row">
      <a class="rounded-md bg-[#00236f] px-6 py-3 text-sm font-semibold text-white" href="/">Kembali ke Beranda</a>
      <a class="rounded-md bg-[#eff4ff] px-6 py-3 text-sm font-semibold text-[#00236f]" href="/directory">Lihat Direktori</a>
    </div>
  </main>
</body>
</html>
